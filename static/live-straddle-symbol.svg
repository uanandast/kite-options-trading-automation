<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Live Straddle Symbol">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>

  <g transform="translate(22,26)">
    <rect x="2" y="56" width="12" height="20" rx="3" fill="#22d3ee"/>
    <rect x="20" y="46" width="12" height="30" rx="3" fill="#38bdf8"/>
    <rect x="38" y="35" width="12" height="41" rx="3" fill="#4ade80"/>
    <rect x="56" y="22" width="12" height="54" rx="3" fill="#f472b6"/>
  </g>

  <path d="M26 90 C40 76, 54 72, 68 58 C78 48, 87 42, 100 32" fill="none" stroke="url(#lineGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
  <circle cx="100" cy="32" r="5" fill="#e879f9"/>
</svg>
