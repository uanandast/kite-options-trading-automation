<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Option Chain Dashboard</title>
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* CSS Variables for premium modern theme management */
        :root {
            /* Base Colors matching ApexCharts background */
            --bg-main: #0b1220; /* Deep navy/slate dark */
            --bg-card: rgba(18, 28, 45, 0.6); /* Glassmorphic card */
            --bg-card-hover: rgba(22, 34, 55, 0.8);
            --bg-header: rgba(11, 18, 32, 0.85);
            
            /* Borders & Dividers */
            --border-light: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(31, 139, 255, 0.3);
            
            /* Typography */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            /* Accents & Signals */
            --accent-primary: #1f8bff; /* Modern Blue */
            --accent-glow: rgba(31, 139, 255, 0.4);
            --accent-secondary: #f59e0b; /* Amber/Gold */
            --color-positive: #21c55d; /* Modern Green */
            --color-negative: #ff5b5b; /* Modern Red */
            
            /* Option specific */
            --call-bg: rgba(255, 91, 91, 0.04);
            --call-header: rgba(255, 91, 91, 0.12);
            --put-bg: rgba(33, 197, 93, 0.04);
            --put-header: rgba(33, 197, 93, 0.12);

            /* Split layout variables */
            --live-panel-size: 64%;
            --main-panel-gap: 14px;
        }

        /* General Body Styles */
        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(31, 139, 255, 0.04), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(33, 197, 93, 0.04), transparent 25%),
                linear-gradient(160deg, rgba(15, 23, 42, 0.85), rgba(8, 47, 73, 0.2));
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        .dashboard-shell {
            max-width: 1800px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .top-cockpit {
            margin-top: 20px;
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid var(--border-light);
            background: linear-gradient(135deg, rgba(11, 18, 32, 0.84), rgba(15, 23, 42, 0.62));
            backdrop-filter: blur(8px);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
        }
        .cockpit-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
            justify-content: center;
            align-items: center;
        }
        .cockpit-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 8px 10px;
        }
        .cockpit-control label {
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .cockpit-control select {
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }
        .cockpit-vitals {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }
        .vital-card {
            background: rgba(0, 0, 0, 0.26);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 10px 12px;
        }
        .vital-card.is-hidden {
            display: none;
        }
        .vital-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 3px;
        }
        .vital-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }
        .vital-value.small {
            font-size: 1rem;
        }

        /* Main Header - Glassmorphic */
        .main-header {
            background-color: var(--bg-header);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 18px 40px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }
        .main-header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .market-status {
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 0.95rem;
        }
        .market-status .symbol {
            font-weight: 600;
            color: var(--text-secondary);
        }
        .market-status .price {
            font-weight: 700;
            font-size: 1.1rem;
            padding: 4px 12px;
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-light);
            display: inline-flex;
            align-items: center;
        }

        .index-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .index-selector label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .index-selector select {
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 14px;
            padding-right: 32px;
        }
        .index-selector select:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .index-selector select:disabled {
            opacity: 0.5;
            cursor: wait;
        }

        /* Main Content Grid */
        .main-content {
            display: flex;
            align-items: stretch;
            gap: var(--main-panel-gap);
            padding: 24px 0;
            margin: 0;
        }

        /* Premium Card Styles */
        .card {
            background-color: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid var(--border-light);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        #live-pnl-card {
            min-height: 640px;
            flex: 0 0 var(--live-panel-size);
            overflow: auto;
        }
        #strategy-card {
            min-height: 560px;
            flex: 1 1 auto;
            overflow: auto;
        }
        .panel-splitter {
            width: 10px;
            cursor: col-resize;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(31, 139, 255, 0.5), rgba(31, 139, 255, 0.1));
            border: 1px solid rgba(31, 139, 255, 0.35);
            align-self: stretch;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            touch-action: none;
            position: relative;
        }
        .panel-splitter::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 42px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.65);
        }
        .panel-splitter:hover,
        .panel-splitter.dragging {
            box-shadow: 0 0 16px rgba(31, 139, 255, 0.45);
            transform: scaleX(1.08);
        }
        .card:hover {
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.25);
            border-color: rgba(255, 255, 255, 0.12);
        }
        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0 0 24px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        /* Left Panel: P&L Chart */
        #pnl-chart {
            flex-grow: 1;
            min-height: 460px;
            width: 100%;
        }
        .chart-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none !important;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }
        .btn-danger:hover:not(:disabled) {
            box-shadow: 0 6px 16px rgba(220, 38, 38, 0.4);
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2);
        }
        .btn-warning:hover:not(:disabled) {
            box-shadow: 0 6px 16px rgba(217, 119, 6, 0.4);
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(71, 85, 105, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover:not(:disabled) {
            box-shadow: 0 6px 16px rgba(71, 85, 105, 0.4);
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
        }

        /* Toasts */
        .toast-container {
            position: fixed;
            right: 24px;
            bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
            pointer-events: none;
        }
        .toast {
            min-width: 280px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
            padding: 16px;
            display: grid;
            grid-template-columns: 4px 1fr auto;
            gap: 16px;
            align-items: center;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .toast-bar {
            height: 100%;
            border-radius: 4px;
            background: var(--color-positive);
            box-shadow: 0 0 8px var(--color-positive);
        }
        .toast.error .toast-bar {
            background: var(--color-negative);
            box-shadow: 0 0 8px var(--color-negative);
        }
        .toast-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .toast-message {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .toast-close {
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
            padding: 4px;
        }
        .toast-close:hover {
            color: var(--text-primary);
        }

        /* Right Panel: Recommendations & P&L */
        #recommendation {
            margin-bottom: 24px;
            flex-grow: 1;
        }
        .recommendation-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-light);
        }
        .recommendation-table th, .recommendation-table td {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .recommendation-table th {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.8rem;
        }
        .recommendation-table tr:last-child td {
            border-bottom: none;
        }
        .recommendation-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .recommendation-title {
            display: none !important; /* Hide the generated double title from JS */
        }

        .metrics-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 16px;
        }
        .metric {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .metric .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .metric .value {
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        #net-pnl {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
            justify-content: space-between;
            font-size: 1.05rem;
            padding: 24px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid var(--border-light);
            margin-top: 10px;
        }

        #net-pnl .label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-right: 8px;
        }

        #net-pnl .value {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .pnl-group,
        .credit-group,
        .delta-group {
            display: flex;
            align-items: center;
        }

        /* Option Chain Container */
        .option-chain-container {
            padding: 32px 40px;
            margin: 0 auto;
            max-width: 1800px;
            background: transparent;
            box-shadow: none;
            border: none;
        }
        .option-chain-container .card-title {
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 32px;
            position: relative;
            display: inline-flex;
            left: 50%;
            transform: translateX(-50%);
        }
        .option-chain-container .card-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
        }

        #option-chain-table {
            border-radius: 16px;
            overflow: auto;
            max-height: 800px; /* Optional constraints for sticky header */
            border: 1px solid var(--border-light);
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        #option-chain-table table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.85rem;
        }

        #option-chain-table th, #option-chain-table td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            font-variant-numeric: tabular-nums;
        }

        #option-chain-table tr:last-child td {
            border-bottom: none;
        }
        #option-chain-table th:last-child, #option-chain-table td:last-child {
            border-right: none;
        }

        #option-chain-table th {
            background-color: rgba(11, 18, 32, 0.95);
            color: var(--text-secondary);
            font-weight: 600;
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        #option-chain-table tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        /* Specific Table Cell Styling */
        .call-header { 
            background-color: var(--call-header) !important; 
            color: var(--color-negative) !important; 
            border-bottom: 2px solid var(--color-negative) !important;
        }
        .put-header { 
            background-color: var(--put-header) !important; 
            color: var(--color-positive) !important; 
            border-bottom: 2px solid var(--color-positive) !important;
        }
        .calls { 
            background-color: var(--call-bg); 
        }
        .puts { 
            background-color: var(--put-bg); 
        }

        .strike {
            background-color: rgba(0, 0, 0, 0.2);
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
            border-left: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.05) !important;
        }
        .atm-strike {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #3b82f6 100%) !important;
            color: #fff !important;
            font-weight: 800;
            box-shadow: 0 0 15px var(--accent-glow);
            border: none !important;
        }
        
        .atm-row td {
            background: rgba(31, 139, 255, 0.08) !important;
            border-top: 1px solid rgba(31, 139, 255, 0.4) !important;
            border-bottom: 1px solid rgba(31, 139, 255, 0.4) !important;
        }

        /* Utility Classes with Glow Multipliers */
        .positive { 
            color: var(--color-positive); 
            text-shadow: 0 0 10px rgba(33, 197, 93, 0.3);
        }
        .negative { 
            color: var(--color-negative); 
            text-shadow: 0 0 10px rgba(255, 91, 91, 0.3);
        }
        .neutral { color: var(--text-muted); }
        .highlight { color: var(--accent-secondary); font-weight: 600; }

        /* Responsive Design */
        @media (max-width: 1400px) {
            .dashboard-shell {
                padding: 0 20px;
            }
            .option-chain-container {
                padding: 20px;
            }
        }
        @media (max-width: 1200px) {
            .main-content {
                flex-direction: column;
            }
            #live-pnl-card,
            #strategy-card {
                flex: 1 1 auto;
            }
            .panel-splitter {
                display: none;
            }
            .metrics-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .cockpit-vitals {
                grid-template-columns: repeat(3, minmax(130px, 1fr));
            }
        }
        @media (max-width: 768px) {
            .dashboard-shell {
                padding: 0 12px;
            }
            .top-cockpit {
                margin-top: 12px;
                padding: 12px;
            }
            .cockpit-controls {
                gap: 8px;
            }
            .cockpit-control {
                width: 100%;
                justify-content: space-between;
            }
            .cockpit-vitals {
                grid-template-columns: repeat(2, minmax(120px, 1fr));
            }
            .main-header {
                flex-direction: column;
                gap: 16px;
                padding: 16px;
            }
            .market-status {
                flex-direction: column;
                gap: 12px;
                width: 100%;
            }
            .index-selector {
                width: 100%;
                justify-content: center;
            }
            .main-content {
                padding: 12px 0;
                gap: 12px;
            }
            .card {
                padding: 20px;
            }
            #option-chain-table {
                overflow-x: auto;
            }
            #net-pnl {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
            .metrics-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1><i class="fa-solid fa-chart-line" style="color: var(--accent-primary);"></i> Option Chain Dashboard</h1>
<div class="market-status">
        <span id="available-margin" class="symbol">Margin: ₹0</span>
    <span id="symbol" class="symbol">Index</span>
    <span id="spot-price" class="price">
        <i class="fa-solid fa-indian-rupee-sign"></i> 
        <span id="spot-value">0.00</span>
        <span id="spot-change" style="margin-left: 6px;">(+0.00%)</span>
    </span>
</div>
    </header>

    <div class="dashboard-shell">
    <section class="top-cockpit" aria-label="Trading cockpit">
        <div class="cockpit-controls">
            <div class="cockpit-control">
                <label for="index-select">Index</label>
                <select id="index-select">
                    <option value="nifty">NIFTY</option>
                    <option value="sensex">SENSEX</option>
                    <option value="banknifty">BANKNIFTY</option>
                </select>
            </div>
            <div class="cockpit-control">
                <label for="cockpit-view">View</label>
                <select id="cockpit-view">
                    <option value="chart_table" selected>Chart + Table</option>
                    <option value="chart">Chart Only</option>
                    <option value="table">Table Only</option>
                </select>
            </div>
        </div>
        <div class="cockpit-vitals" id="cockpit-vitals">
            <div class="vital-card" id="vital-card-symbol">
                <div class="vital-label">Symbol</div>
                <div class="vital-value" id="vital-symbol">--</div>
            </div>
            <div class="vital-card" id="vital-card-spot">
                <div class="vital-label">Spot</div>
                <div class="vital-value" id="vital-spot">--</div>
            </div>
            <div class="vital-card" id="vital-card-atm">
                <div class="vital-label">ATM Strike</div>
                <div class="vital-value" id="vital-atm">--</div>
            </div>
            <div class="vital-card" id="vital-card-price">
                <div class="vital-label">Price</div>
                <div class="vital-value" id="vital-price">--</div>
            </div>
            <div class="vital-card" id="vital-card-low">
                <div class="vital-label">Low</div>
                <div class="vital-value" id="vital-low">--</div>
            </div>
            <div class="vital-card" id="vital-card-high">
                <div class="vital-label">High</div>
                <div class="vital-value" id="vital-high">--</div>
            </div>
            <div class="vital-card" id="vital-card-updated">
                <div class="vital-label">Last Updated</div>
                <div class="vital-value small" id="vital-updated">--</div>
            </div>
        </div>
    </section>

    <main class="main-content">
        <div id="live-pnl-card" class="card">
            <h3 class="card-title"><i class="fa-solid fa-wave-square"></i> Live P&L</h3>
            <div id="pnl-chart"></div>
            <div class="chart-controls">
                <button id="manual-exit-btn" class="btn btn-danger"><i class="fa-solid fa-circle-stop"></i> Exit Positions</button>
                <button id="manual-sl-btn" class="btn btn-warning"><i class="fa-solid fa-shield-halved"></i> Place SL Orders</button>
                <button id="cancel-sl-btn" class="btn btn-secondary"><i class="fa-solid fa-ban"></i> Cancel SL Orders</button>
            </div>
        </div>

        <div id="main-splitter" class="panel-splitter" role="separator" aria-label="Resize Live PnL panel" aria-orientation="vertical"></div>

        <div id="strategy-card" class="card">
            <h3 class="card-title"><i class="fa-solid fa-star" style="color: var(--accent-secondary);"></i> Strategy & Vitals</h3>
            <div id="recommendation">
                <table class="recommendation-table">
                   <thead><tr><th>Action</th><th>Strike</th><th>Type</th><th>Premium</th></tr></thead>
                   <tbody id="recommendation-body">
                   </tbody>
                </table>
            </div>

            <div id="net-pnl" class="positive">
  <span class="pnl-group">
    <span class="label">Net P&amp;L:</span> 
    <span id="pnl-combined" class="value negative">₹0.00 (0.00%)</span>
  </span>
  <span class="credit-group">
    <span class="label">Current Strangle Price:</span> 
    <span id="credit-value" class="value">₹0.00</span>
  </span>
  <span class="delta-group">
    <span class="label">Delta:</span> 
    <span id="delta-value" class="value">0.00</span>
  </span>
</div>
        </div>
    </main>
    </div>

    <div class="option-chain-container card">
        <h2 class="card-title" style="justify-content: center;"><i class="fa-solid fa-table-cells"></i> Option Chain</h2>
        <div id="option-chain-table">
            </div>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="static/script.js"></script>

</body>
</html>
